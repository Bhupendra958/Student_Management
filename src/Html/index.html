<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
    min-height: 100vh;
    padding: 45px 20px;
    color: #18223b;
    background:
        radial-gradient(circle at 15% 15%, rgba(113, 91, 255, 0.35), transparent 28%),
        radial-gradient(circle at 85% 80%, rgba(0, 212, 255, 0.25), transparent 30%),
        linear-gradient(135deg, #11162f 0%, #25245c 48%, #164d6b 100%);
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.container {
    width: min(100%, 620px);
    padding: 30px;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.65);
    border-radius: 24px;
    box-shadow: 0 24px 70px rgba(3, 8, 35, 0.4);
    backdrop-filter: blur(14px);
}

h2 {
    margin-bottom: 26px;
    color: #171d3f;
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 800;
    text-align: center;
    letter-spacing: -1px;
}

h2::after {
    content: "";
    display: block;
    width: 64px;
    height: 5px;
    margin: 11px auto 0;
    border-radius: 20px;
    background: linear-gradient(90deg, #7058f5, #1db9da);
}

.section {
    margin-bottom: 18px;
    padding: 21px;
    background: #ffffff;
    border: 1px solid #e8eaf3;
    border-radius: 16px;
    box-shadow: 0 7px 22px rgba(38, 47, 92, 0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.section:hover {
    transform: translateY(-3px);
    border-color: #cbc5ff;
    box-shadow: 0 12px 30px rgba(71, 67, 155, 0.14);
}

.section:last-child {
    margin-bottom: 0;
}

h3 {
    margin-bottom: 12px;
    color: #353664;
    font-size: 1.05rem;
    font-weight: 700;
}

input {
    width: 100%;
    margin: 6px 0;
    padding: 12px 14px;
    color: #202842;
    background: #f7f8fc;
    border: 1px solid #dfe2ec;
    border-radius: 10px;
    font-size: 0.96rem;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

input::placeholder {
    color: #9298aa;
}

input:focus {
    background: #ffffff;
    border-color: #715cf5;
    box-shadow: 0 0 0 4px rgba(113, 92, 245, 0.13);
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px 18px;
    color: #ffffff;
    background: linear-gradient(135deg, #7058f5, #4e43c7);
    border: none;
    border-radius: 10px;
    box-shadow: 0 7px 16px rgba(91, 73, 220, 0.25);
    font-size: 0.96rem;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(91, 73, 220, 0.35);
    filter: brightness(1.08);
}

button:active {
    transform: translateY(0);
}

.remove-btn {
    background: linear-gradient(135deg, #f05b71, #d93d59);
    box-shadow: 0 7px 16px rgba(217, 61, 89, 0.23);
}

.remove-btn:hover {
    box-shadow: 0 10px 22px rgba(217, 61, 89, 0.33);
}

#output {
    display: grid;
    gap: 10px;
    margin-top: 14px;
}

.details {
    padding: 14px 16px;
    background: linear-gradient(135deg, #f7f6ff, #eef9fc);
    border: 1px solid #dedcf6;
    border-left: 5px solid #7058f5;
    border-radius: 11px;
    line-height: 1.7;
}

.details h1 {
    color: #555b78;
    font-size: 1rem;
    text-align: center;
}

.details p {
    color: #555b78;
}

@media (max-width: 560px) {
    body {
        padding: 22px 12px;
    }

    .container {
        padding: 18px;
        border-radius: 18px;
    }

    .section {
        padding: 17px;
    }
}
</style>

</head>
<body>

<div class="container">

    <h2>Student Management</h2>

    <!-- Add Student -->
    <div class="section">
        <h3>Add Student</h3>

        <input type="number" placeholder="Roll No" id="RollNo">
        <input type="text" placeholder="Student Name" id="Name">
        <input type="number" placeholder="Marks" id="Marks">

        <button id="addbtn">Add Student</button>
    </div>

    <!-- Find Student -->
    <div class="section">
        <h3>Find Student</h3>

        <input type="number" placeholder="Enter Roll No " id="search">

        <button id="findbtn">Find Student</button>
    </div>

    <!-- Update Student -->
    <div class="section">
        <h3>Update Student</h3>

        <input type="number" placeholder="Roll No" id="uRoll">
        <input type="text" placeholder="Student Name" id="uName">
        <input type="number" placeholder="Marks" id="uMarks">

        <button id="updatebtn">Update Student</button>
    </div>

    <!-- Remove Student -->
    <div class="section">
        <h3>Remove Student</h3>

        <input type="number" placeholder="Enter Roll No" id="removeRoll">

        <button id="removebtn" class="remove-btn">Remove Student</button>
    </div>

    <!-- Show Details -->
    <div class="section">
        <h3>Show Details</h3>

       <button id="showbtn">Show All Students</button>
       <div id="output" >
        <div class="details">
            <h1>Student Details</h1>

        </div>
       </div>
    </div>

</div>
<script src="../../dist/app.js"></script>

</body>
</html>
